name: Agent validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared-tests:
    name: Shared Android host tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run shared Android host tests
        run: bash ./gradlew --no-daemon :app:shared:testAndroidHostTest

  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run server tests
        run: bash ./gradlew --no-daemon :server:test

  android-debug:
    name: Android debug assembly
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Assemble Android debug app
        run: bash ./gradlew --no-daemon :app:androidApp:assembleDebug
